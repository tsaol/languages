{% extends "base.html" %}
{% set active_page = "chat" %}

{% block title %}EngLearn - Chat{% endblock %}

{% block head %}
<style>
    .chat-page {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 60px);
        height: calc(100dvh - 60px);
        max-width: 480px;
        margin: 0 auto;
        padding: 0;
        overflow: hidden;
        position: relative;
    }

    /* ── Role Selection Screen ── */
    .role-select {
        padding: 20px;
        flex: 1;
        overflow-y: auto;
    }

    .role-select h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
    }

    .role-select .subtitle {
        font-size: 0.8rem;
        color: var(--text-dim);
        margin-bottom: 20px;
    }

    .role-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    @media (max-width: 400px) {
        .role-grid { grid-template-columns: 1fr; }
    }

    .role-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 16px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
    }

    .role-card:hover {
        border-color: var(--accent);
        background: var(--surface2);
    }

    .role-card:active { transform: scale(0.97); }

    .role-card .role-name {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 2px;
    }

    .role-card .role-title {
        font-size: 0.72rem;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 8px;
    }

    .role-card .role-desc {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.5;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* ── Scenario Selection Screen ── */
    .scenario-select {
        padding: 20px;
        flex: 1;
        overflow-y: auto;
    }

    .scenario-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }

    .scenario-header .back-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        flex-shrink: 0;
    }

    .scenario-header .back-btn:hover {
        color: var(--text);
        border-color: var(--text-dim);
    }

    .scenario-header-info .sh-name {
        font-size: 1.2rem;
        font-weight: 700;
    }

    .scenario-header-info .sh-title {
        font-size: 0.72rem;
        color: var(--accent);
        font-weight: 600;
    }

    .scenario-personality {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.5;
        margin-bottom: 18px;
        padding: 10px 14px;
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
    }

    .scenario-list-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .scenario-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .scenario-card:hover {
        border-color: var(--accent);
        background: var(--surface2);
    }

    .scenario-card:active { transform: scale(0.98); }

    .scenario-card .sc-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .scenario-card .sc-title {
        font-size: 0.95rem;
        font-weight: 600;
    }

    .scenario-card .sc-badge {
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .sc-badge.beginner { background: var(--accent-dim); color: var(--accent); }
    .sc-badge.intermediate { background: var(--blue-dim); color: var(--blue); }
    .sc-badge.advanced { background: var(--yellow-dim); color: var(--yellow); }

    .scenario-card .sc-desc {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.4;
        margin-bottom: 6px;
    }

    .scenario-card .sc-vocab {
        font-size: 0.7rem;
        color: var(--blue);
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
    }

    .scenario-card .sc-vocab span {
        background: var(--blue-dim);
        padding: 1px 6px;
        border-radius: 4px;
    }

    .scenario-card.free-talk {
        border-style: dashed;
    }

    .scenario-card.free-talk .sc-title {
        color: var(--accent);
    }

    /* ── Chat Interface ── */
    .chat-header {
        padding: 12px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .chat-header .back-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .chat-header .back-btn:hover {
        color: var(--text);
    }

    .chat-header-info {
        flex: 1;
    }

    .chat-header-info .chat-role-name {
        font-size: 0.95rem;
        font-weight: 700;
    }

    .chat-header-info .chat-scenario-name {
        font-size: 0.68rem;
        color: var(--accent);
        font-weight: 500;
    }

    .chat-header .btn-new {
        padding: 5px 12px;
        font-size: 0.7rem;
        font-weight: 600;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.15s;
    }

    .chat-header .btn-new:hover {
        color: var(--text);
        border-color: var(--text-dim);
    }

    /* Messages Area */
    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .msg-row {
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.3s ease;
    }

    .msg-row.user { align-items: flex-end; }
    .msg-row.ai { align-items: flex-start; }

    .msg-bubble {
        max-width: 82%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 0.92rem;
        line-height: 1.55;
        word-wrap: break-word;
    }

    .msg-row.user .msg-bubble {
        background: var(--accent-dim);
        color: var(--text);
        border-bottom-right-radius: 4px;
    }

    .msg-row.ai .msg-bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
    }

    .msg-corrections {
        max-width: 82%;
        margin-top: 3px;
        padding: 4px 10px;
        font-size: 0.72rem;
        color: var(--red);
        line-height: 1.5;
    }

    .msg-corrections .correction-item { margin-bottom: 4px; }
    .msg-corrections .correction-item .correct-text {
        color: var(--accent);
        font-weight: 500;
    }
    .msg-corrections .correction-item .explanation {
        display: block;
        color: var(--text-dim);
        font-size: 0.68rem;
        margin-top: 1px;
    }

    /* Typing Indicator */
    .typing-indicator {
        display: flex;
        align-items: flex-start;
        animation: fadeIn 0.3s ease;
    }

    .typing-bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        padding: 10px 16px;
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-dim);
        animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-4px); opacity: 1; }
    }

    /* Input Area */
    .chat-input-area {
        padding: 12px 20px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
        z-index: 10;
    }

    .chat-input-area input {
        flex: 1;
        padding: 12px 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 24px;
        color: var(--text);
        font-size: 0.92rem;
        outline: none;
        transition: border-color 0.15s;
    }

    .chat-input-area input:focus { border-color: var(--accent); }
    .chat-input-area input::placeholder { color: var(--text-dim); }

    .send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        color: #0f1117;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        flex-shrink: 0;
    }

    .send-btn:hover { background: #5ceb95; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Action text *action* rendered in parentheses + different color */
    .action-text {
        color: var(--yellow);
        opacity: 0.8;
    }

    /* Clickable words */
    .clickable-words .word {
        cursor: pointer;
        border-radius: 3px;
        padding: 0 1px;
        transition: background 0.15s;
    }
    .clickable-words .word:hover { background: var(--blue-dim); color: var(--blue); }

    .tap-hint {
        font-size: 0.62rem;
        color: var(--text-dim);
        opacity: 0.5;
        margin-top: 2px;
        padding: 0 4px;
    }

    /* Delete confirmation */
    .msg-row.selected .msg-bubble {
        outline: 2px solid var(--red);
        outline-offset: 2px;
    }

    .delete-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 12px 20px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        background: var(--surface);
        border-top: 1px solid var(--border);
        box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }

    .delete-bar-inner {
        max-width: 480px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
    }

    .delete-bar .delete-label {
        font-size: 0.85rem;
        color: var(--text-dim);
    }

    .delete-bar .btn-del {
        padding: 8px 20px;
        font-size: 0.82rem;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    .delete-bar .btn-cancel {
        background: var(--surface2);
        color: var(--text-dim);
        border: 1px solid var(--border);
    }

    .delete-bar .btn-confirm-del {
        background: var(--red);
        color: #fff;
    }
</style>
{% endblock %}

{% block body %}
<div class="chat-page">

    <!-- Screen 1: Role Selection -->
    <div id="roleSelect" class="role-select fade-in">
        <h1>Chat</h1>
        <div class="subtitle">Choose a conversation partner</div>
        <div class="role-grid" id="roleGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Screen 2: Scenario Selection -->
    <div id="scenarioSelect" class="scenario-select" style="display:none;">
        <div class="scenario-header">
            <button class="back-btn" onclick="backToRoles()">&#8592;</button>
            <div class="scenario-header-info">
                <div class="sh-name" id="shName"></div>
                <div class="sh-title" id="shTitle"></div>
            </div>
        </div>
        <div class="scenario-personality" id="shPersonality"></div>
        <div class="scenario-list-title">Scenarios</div>
        <div id="scenarioList"></div>
    </div>

    <!-- Screen 3: Chat Interface -->
    <div id="chatArea" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="chat-header">
            <button class="back-btn" onclick="backToScenarios()">&#8592;</button>
            <div class="chat-header-info">
                <div class="chat-role-name" id="chatRoleName"></div>
                <div class="chat-scenario-name" id="chatScenarioName"></div>
            </div>
            <button class="btn-new" onclick="restartChat()">New Chat</button>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..."
                   spellcheck="true" autocapitalize="sentences" autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
        </div>
    </div>

    <!-- Delete message bar -->
    <div class="delete-bar" id="deleteBar">
        <div class="delete-bar-inner">
            <span class="delete-label">Delete this message?</span>
            <div style="display:flex; gap:8px;">
                <button class="btn-del btn-cancel" onclick="cancelDelete()">Cancel</button>
                <button class="btn-del btn-confirm-del" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Floating vocab save form -->
    <div id="vocabOverlay" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:999; padding:16px; background:var(--surface); border-top:1px solid var(--border); box-shadow:0 -4px 20px rgba(0,0,0,0.3);">
        <div style="max-width:480px; margin:0 auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size:0.8rem; font-weight:600; color:var(--blue);">Save to Vocab</span>
                <span onclick="closeVocabForm()" style="cursor:pointer; font-size:1.2rem; color:var(--text-dim);">&#10005;</span>
            </div>
            <input type="text" id="vocabWord" readonly style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; font-weight:600; margin-bottom:8px;">
            <input type="text" id="vocabChinese" placeholder="Chinese meaning..." style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; margin-bottom:8px;">
            <button onclick="saveToVocab()" class="btn btn-accent w-full">Save</button>
            <div id="vocabSuccess" style="display:none; font-size:0.85rem; color:var(--accent); text-align:center; margin-top:8px;"></div>
        </div>
    </div>

</div>

<script>
let rolesData = {};
let currentRole = null;
let currentScenario = null;  // null = free talk
let isSending = false;

// ── Load roles from API ──
async function loadRoles() {
    try {
        const resp = await fetch('/api/chat/roles');
        const data = await resp.json();
        rolesData = data.roles;
        renderRoleCards();
    } catch (e) {
        console.error('Failed to load roles:', e);
    }
}

function renderRoleCards() {
    const grid = document.getElementById('roleGrid');
    grid.innerHTML = '';
    for (const [rid, role] of Object.entries(rolesData)) {
        const card = document.createElement('div');
        card.className = 'role-card';
        card.onclick = () => selectRole(rid);
        card.innerHTML = `
            <div class="role-name">${esc(role.name)}</div>
            <div class="role-title">${esc(role.title)}</div>
            <div class="role-desc">${esc(role.description)}</div>
        `;
        grid.appendChild(card);
    }
}

// ── Screen Navigation ──
function selectRole(roleId) {
    currentRole = roleId;
    const role = rolesData[roleId];

    document.getElementById('shName').textContent = role.name;
    document.getElementById('shTitle').textContent = role.title;
    document.getElementById('shPersonality').textContent = role.personality;

    // Render scenario cards
    const list = document.getElementById('scenarioList');
    list.innerHTML = '';

    // Free Talk option first
    const freeCard = document.createElement('div');
    freeCard.className = 'scenario-card free-talk';
    freeCard.onclick = () => startChat(null);
    freeCard.innerHTML = `
        <div class="sc-top">
            <div class="sc-title">Free Talk</div>
        </div>
        <div class="sc-desc">Open conversation — talk about anything you like</div>
    `;
    list.appendChild(freeCard);

    // Scenario cards
    for (const s of role.scenarios) {
        const card = document.createElement('div');
        card.className = 'scenario-card';
        card.onclick = () => startChat(s.id);
        let vocabHtml = '';
        if (s.vocabulary && s.vocabulary.length > 0) {
            vocabHtml = '<div class="sc-vocab">' + s.vocabulary.slice(0, 5).map(v => `<span>${esc(v)}</span>`).join('') + '</div>';
        }
        card.innerHTML = `
            <div class="sc-top">
                <div class="sc-title">${esc(s.title)}</div>
                <span class="sc-badge ${s.difficulty}">${s.difficulty}</span>
            </div>
            <div class="sc-desc">${esc(s.desc)}</div>
            ${vocabHtml}
        `;
        list.appendChild(card);
    }

    document.getElementById('roleSelect').style.display = 'none';
    document.getElementById('scenarioSelect').style.display = '';
}

function backToRoles() {
    currentRole = null;
    currentScenario = null;
    document.getElementById('scenarioSelect').style.display = 'none';
    document.getElementById('roleSelect').style.display = '';
}

function backToScenarios() {
    document.getElementById('chatArea').style.display = 'none';
    document.getElementById('scenarioSelect').style.display = '';
}

// ── Start Chat Session ──
async function startChat(scenarioId) {
    currentScenario = scenarioId;
    const role = rolesData[currentRole];

    // Set header info
    document.getElementById('chatRoleName').textContent = role.name;
    if (scenarioId) {
        const scenario = role.scenarios.find(s => s.id === scenarioId);
        document.getElementById('chatScenarioName').textContent = scenario ? scenario.title : '';
    } else {
        document.getElementById('chatScenarioName').textContent = 'Free Talk';
    }

    // Show chat area
    document.getElementById('scenarioSelect').style.display = 'none';
    document.getElementById('chatArea').style.display = 'flex';
    document.getElementById('messagesArea').innerHTML = '';

    // Check if there's existing history
    const history = await loadHistory();
    if (!history || history.length === 0) {
        // Start new session — get first message from AI
        await startNewSession();
    }

    document.getElementById('chatInput').focus();
}

async function loadHistory() {
    try {
        let url = '/api/chat/history?role_id=' + encodeURIComponent(currentRole);
        if (currentScenario) url += '&scenario_id=' + encodeURIComponent(currentScenario);
        const resp = await fetch(url);
        const data = await resp.json();
        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(msg => {
                if (msg.sender === 'user') {
                    appendUserMessage(msg.message, msg.corrections || [], msg.id);
                } else {
                    appendAIMessage(msg.message, msg.id);
                }
            });
            scrollToBottom();
            return data.messages;
        }
        return [];
    } catch (e) {
        console.error('Failed to load history:', e);
        return [];
    }
}

async function startNewSession() {
    try {
        const resp = await fetch('/api/chat/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                role_id: currentRole,
                scenario_id: currentScenario || '',
            })
        });
        const data = await resp.json();
        if (data.first_message) {
            appendAIMessage(data.first_message, data.msg_id);
            scrollToBottom();
        }
    } catch (e) {
        console.error('Failed to start session:', e);
    }
}

async function restartChat() {
    document.getElementById('messagesArea').innerHTML = '';
    await startNewSession();
}

// ── Message Display ──
let deleteTargetId = null;
let longPressTimer = null;

function addLongPress(el, msgId) {
    if (!msgId) return;
    el.addEventListener('touchstart', e => {
        longPressTimer = setTimeout(() => { selectForDelete(el, msgId); }, 500);
    }, {passive: true});
    el.addEventListener('touchend', () => clearTimeout(longPressTimer));
    el.addEventListener('touchmove', () => clearTimeout(longPressTimer));
    // Desktop: right-click
    el.addEventListener('contextmenu', e => {
        e.preventDefault();
        selectForDelete(el, msgId);
    });
}

function selectForDelete(rowEl, msgId) {
    cancelDelete();
    deleteTargetId = msgId;
    rowEl.classList.add('selected');
    document.getElementById('deleteBar').style.display = 'block';
}

function cancelDelete() {
    deleteTargetId = null;
    document.querySelectorAll('.msg-row.selected').forEach(el => el.classList.remove('selected'));
    document.getElementById('deleteBar').style.display = 'none';
}

async function confirmDelete() {
    if (!deleteTargetId) return;
    try {
        const resp = await fetch('/api/chat/delete-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message_id: deleteTargetId })
        });
        const data = await resp.json();
        if (data.ok) {
            const row = document.querySelector(`.msg-row[data-msg-id="${deleteTargetId}"]`);
            if (row) row.remove();
        }
    } catch (e) {
        console.error('Delete failed:', e);
    }
    cancelDelete();
}

function appendUserMessage(text, corrections, msgId) {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    if (msgId) row.setAttribute('data-msg-id', msgId);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    if (corrections && corrections.length > 0) {
        const corrDiv = document.createElement('div');
        corrDiv.className = 'msg-corrections';
        corrections.forEach(c => {
            const item = document.createElement('div');
            item.className = 'correction-item';
            item.innerHTML = '"' + esc(c.wrong || '') + '" &rarr; <span class="correct-text">' + esc(c.correct || '') + '</span>' + (c.explanation ? '<span class="explanation">' + esc(c.explanation) + '</span>' : '');
            corrDiv.appendChild(item);
        });
        row.appendChild(corrDiv);
    }

    addLongPress(row, msgId);
    area.appendChild(row);
}

function appendAIMessage(text, msgId) {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    if (msgId) row.setAttribute('data-msg-id', msgId);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble clickable-words';
    bubble.innerHTML = makeWordsClickable(text);
    row.appendChild(bubble);

    const hint = document.createElement('div');
    hint.className = 'tap-hint';
    hint.textContent = 'Tap any word to save to Vocab';
    row.appendChild(hint);

    addLongPress(row, msgId);
    area.appendChild(row);
}

function showTyping() {
    const area = document.getElementById('messagesArea');
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.id = 'typingIndicator';
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    indicator.appendChild(bubble);
    area.appendChild(indicator);
    scrollToBottom();
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

// ── Send Message ──
async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isSending) return;

    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';

    appendUserMessage(text, [], null);
    scrollToBottom();
    showTyping();

    try {
        const resp = await fetch('/api/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                role_id: currentRole,
                message: text,
                scenario_id: currentScenario || '',
            })
        });
        const data = await resp.json();
        hideTyping();

        // Attach message ID to the user row
        const userRows = document.querySelectorAll('.msg-row.user');
        const lastUserRow = userRows[userRows.length - 1];
        if (lastUserRow && data.user_msg_id) {
            lastUserRow.setAttribute('data-msg-id', data.user_msg_id);
            addLongPress(lastUserRow, data.user_msg_id);
        }

        // Update corrections on last user message
        if (data.corrections && data.corrections.length > 0 && lastUserRow) {
            const existingCorr = lastUserRow.querySelector('.msg-corrections');
            if (existingCorr) existingCorr.remove();

            const corrDiv = document.createElement('div');
            corrDiv.className = 'msg-corrections';
            data.corrections.forEach(c => {
                const item = document.createElement('div');
                item.className = 'correction-item';
                item.innerHTML = '"' + esc(c.wrong || '') + '" &rarr; <span class="correct-text">' + esc(c.correct || '') + '</span>' + (c.explanation ? '<span class="explanation">' + esc(c.explanation) + '</span>' : '');
                corrDiv.appendChild(item);
            });
            lastUserRow.appendChild(corrDiv);
        }

        if (data.reply) {
            appendAIMessage(data.reply, data.ai_msg_id);
        }
        scrollToBottom();
    } catch (e) {
        hideTyping();
        appendAIMessage('Sorry, something went wrong. Please try again.');
        scrollToBottom();
    }

    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
}

function scrollToBottom() {
    const area = document.getElementById('messagesArea');
    requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

// ── Utils ──
function makeWordsClickable(text) {
    if (!text) return '';
    // Split on *action* blocks — actions render in parentheses + yellow color, still clickable
    let result = '';
    const parts = text.split(/(\*[^*]+\*)/g);
    for (const part of parts) {
        if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
            const inner = esc(part.slice(1, -1)).replace(/([a-zA-Z'-]+)/g,
                '<span class="word" onclick="openVocabForm(this.textContent)">$1</span>');
            result += '<span class="action-text">(' + inner + ')</span>';
        } else {
            result += esc(part).replace(/([a-zA-Z'-]+)/g,
                '<span class="word" onclick="openVocabForm(this.textContent)">$1</span>');
        }
    }
    return result;
}

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Vocab Overlay ──
async function openVocabForm(word) {
    const clean = word.replace(/[^a-zA-Z'-]/g, '').toLowerCase();
    if (clean.length < 2) return;
    document.getElementById('vocabWord').value = clean;
    document.getElementById('vocabChinese').value = 'Translating...';
    document.getElementById('vocabSuccess').style.display = 'none';
    document.getElementById('vocabOverlay').style.display = 'block';
    try {
        const resp = await fetch('/vocab/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word: clean })
        });
        const data = await resp.json();
        document.getElementById('vocabChinese').value = data.chinese || '';
    } catch (e) {
        document.getElementById('vocabChinese').value = '';
    }
    document.getElementById('vocabChinese').focus();
}

function closeVocabForm() {
    document.getElementById('vocabOverlay').style.display = 'none';
}

async function saveToVocab() {
    const word = document.getElementById('vocabWord').value.trim();
    const chinese = document.getElementById('vocabChinese').value.trim();
    if (!word || !chinese) return;

    const resp = await fetch('/vocab/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word, chinese, category: 'chat' })
    });
    const data = await resp.json();
    if (data.ok) {
        const el = document.getElementById('vocabSuccess');
        el.textContent = '"' + word + '" saved!';
        el.style.display = 'block';
        setTimeout(() => closeVocabForm(), 1000);
    }
}

// ── Keyboard ──
document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
});
document.getElementById('vocabChinese').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveToVocab();
});

// ── Init ──
loadRoles();
</script>
